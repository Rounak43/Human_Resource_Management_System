version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hrms_postgres
    restart: always
    environment:
      POSTGRES_DB: hrms_db
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: hrms_password_secure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: hrms_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hrms.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
